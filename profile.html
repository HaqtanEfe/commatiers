<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Profile — PVP Tiers</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDdz5u46Q8IIOEmfUOSmCxKBnoE52A7y34",
    authDomain: "friendstierlist-9a5fb.firebaseapp.com",
    projectId: "friendstierlist-9a5fb",
    storageBucket: "friendstierlist-9a5fb.firebasestorage.app",
    messagingSenderId: "774591972842",
    appId: "1:774591972842:web:d414a35464b4742fa21e93"
  };

  const GAMEMODES = [
    { id: "crystal", label: "Crystal" },
    { id: "sword",   label: "Sword"   },
    { id: "smp",     label: "SMP"     },
    { id: "uhc",     label: "UHC"     },
    { id: "mace",    label: "Mace"    },
    { id: "axe",     label: "Axe"     },
  ];

  const TIERS = [
    { id: "HT1", label: "High Tier 1", color: "#e63946" },
    { id: "LT1", label: "Low Tier 1",  color: "#ff9aa2" },
    { id: "HT2", label: "High Tier 2", color: "#f77f00" },
    { id: "LT2", label: "Low Tier 2",  color: "#ffbe7a" },
    { id: "HT3", label: "High Tier 3", color: "#2a9d8f" },
    { id: "LT3", label: "Low Tier 3",  color: "#8fd3c7" },
    { id: "HT4", label: "High Tier 4", color: "#457b9d" },
    { id: "LT4", label: "Low Tier 4",  color: "#a8cbe0" },
    { id: "HT5", label: "High Tier 5", color: "#6a4c93" },
    { id: "LT5", label: "Low Tier 5",  color: "#c3aed6" },
  ];

  // Extract username from URL: /profile/username
  const pathParts = window.location.pathname.split("/");
  const USERNAME = decodeURIComponent(pathParts[pathParts.length - 1] || "");

  if (!USERNAME) {
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("content").innerHTML = `<div class="error-state">No player specified in URL.</div>`;
    });
  }

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  document.addEventListener("DOMContentLoaded", async () => {
    if (!USERNAME) return;

    document.title = `${USERNAME} — PVP Tiers`;
    document.getElementById("player-name").textContent = USERNAME;
    document.getElementById("mc-avatar").src = `https://minotar.net/body/${encodeURIComponent(USERNAME)}/120`;
    document.getElementById("mc-avatar-head").src = `https://minotar.net/avatar/${encodeURIComponent(USERNAME)}/80`;

    // Listen to main tier data in real time
    onSnapshot(doc(db, "tierlist", "data"), snap => {
      if (!snap.exists()) return;
      const data = snap.data();
      renderCurrentTiers(data);
    });

    // Load history (one-time + live)
    onSnapshot(doc(db, "history", USERNAME.toLowerCase()), snap => {
      if (!snap.exists()) {
        renderHistory([]);
        return;
      }
      const entries = snap.data().entries || [];
      // Sort newest first
      entries.sort((a, b) => b.ts - a.ts);
      renderHistory(entries);
    });
  });

  function renderCurrentTiers(data) {
    const grid = document.getElementById("tiers-grid");
    grid.innerHTML = "";

    let hasAny = false;
    GAMEMODES.forEach(gm => {
      let currentTier = null;
      for (const tier of TIERS) {
        if ((data.tiers?.[gm.id]?.[tier.id] || []).includes(USERNAME)) {
          currentTier = tier; break;
        }
      }

      const card = document.createElement("div");
      card.className = "gm-card" + (currentTier ? "" : " gm-unranked");

      if (currentTier) {
        hasAny = true;
        card.style.borderColor = currentTier.color + "66";
        card.style.background  = currentTier.color + "0d";
        card.innerHTML = `
          <div class="gm-icon">${gmIconSvg(gm.id)}</div>
          <div class="gm-label">${gm.label}</div>
          <div class="gm-tier" style="color:${currentTier.color};background:${currentTier.color}18;border-color:${currentTier.color}44">${currentTier.id}</div>
          <div class="gm-tier-name" style="color:${currentTier.color}">${currentTier.label}</div>`;
      } else {
        card.innerHTML = `
          <div class="gm-icon muted-icon">${gmIconSvg(gm.id)}</div>
          <div class="gm-label">${gm.label}</div>
          <div class="gm-tier unranked-tier">—</div>
          <div class="gm-tier-name" style="color:var(--muted)">Unranked</div>`;
      }
      grid.appendChild(card);
    });

    if (!hasAny) {
      document.getElementById("no-tiers-note").style.display = "block";
    } else {
      document.getElementById("no-tiers-note").style.display = "none";
    }
  }

  function renderHistory(entries) {
    const container = document.getElementById("history-list");
    container.innerHTML = "";

    if (!entries.length) {
      container.innerHTML = `<div class="empty-history">No tier changes recorded yet.</div>`;
      return;
    }

    entries.forEach(entry => {
      const row = document.createElement("div");
      row.className = "history-entry";

      const date = new Date(entry.ts);
      const dateStr = date.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
      const timeStr = date.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });

      const fromHtml = entry.from
        ? `<span class="tier-pill" style="background:${entry.from.color}22;color:${entry.from.color};border-color:${entry.from.color}55">${entry.from.id}</span>`
        : `<span class="tier-pill unranked-pill">Unranked</span>`;

      const toHtml = entry.to
        ? `<span class="tier-pill" style="background:${entry.to.color}22;color:${entry.to.color};border-color:${entry.to.color}55">${entry.to.id}</span>`
        : `<span class="tier-pill unranked-pill">Removed</span>`;

      const arrowColor = !entry.to ? "#e05555"
        : !entry.from ? "#4cde82"
        : TIERS.findIndex(t => t.id === entry.to.id) < TIERS.findIndex(t => t.id === entry.from.id) ? "#4cde82"
        : "#f87171";

      row.innerHTML = `
        <div class="he-date">
          <span class="he-datestr">${dateStr}</span>
          <span class="he-timestr">${timeStr}</span>
        </div>
        <div class="he-gm">
          <span class="he-gm-icon">${gmIconSvg(entry.gmId)}</span>
          <span>${entry.gm}</span>
        </div>
        <div class="he-change">
          ${fromHtml}
          <span class="he-arrow" style="color:${arrowColor}">→</span>
          ${toHtml}
        </div>`;
      container.appendChild(row);
    });
  }

  function gmIconSvg(id) {
    const m = {
      crystal:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polygon points="12,2 22,9 18,21 6,21 2,9"/><line x1="12" y1="2" x2="12" y2="21"/><line x1="2" y1="9" x2="22" y2="9"/></svg>`,
      sword:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="2" x2="12" y2="18"/><path d="M8 6l4-4 4 4"/><path d="M9 18h6"/><path d="M10 21h4"/></svg>`,
      smp:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/><path d="M15.5 19.5c-.83 0-1.5-.67-1.5-1.5v-1.5h1.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/><path d="M10 9.5c0 .83-.67 1.5-1.5 1.5H3.5C2.67 11 2 10.33 2 9.5S2.67 8 3.5 8h5c.83 0 1.5.67 1.5 1.5z"/><path d="M8.5 5c.83 0 1.5.67 1.5 1.5V8H8.5C7.67 8 7 7.33 7 6.5S7.67 5 8.5 5z"/></svg>`,
      uhc:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
      mace:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="9" y="1" width="6" height="10" rx="2"/><rect x="5" y="3" width="14" height="6" rx="2"/><line x1="12" y1="11" x2="12" y2="23"/></svg>`,
      axe:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 12L5 21"/><path d="M14.5 4.5C12 2 8 2.5 6 5c-1.5 2-1 5 .5 7l8-8c-1-1.5-1.5-3-1-4.5z"/><path d="M14.5 4.5c1.5-1 3.5-.5 4.5 1 1.5 2 1 5-.5 7l-4-4"/></svg>`,
    };
    return m[id] || `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/></svg>`;
  }
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0f14; --card:#131720; --card2:#181d2a; --border:#1e2336;
  --text:#dde0ee; --muted:#4e5570; --accent:#5865f2;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}

/* Top bar */
.top-bar{
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;height:52px;gap:16px;
  position:sticky;top:0;z-index:50;
}
.back-link{
  display:flex;align-items:center;gap:6px;color:var(--muted);
  text-decoration:none;font-size:.82rem;font-weight:500;
  transition:color .12s;
}
.back-link:hover{color:var(--text);}
.back-link svg{width:16px;height:16px;}
.top-title{font-size:.9rem;font-weight:700;color:#fff;letter-spacing:.5px;}

/* Page layout */
.page{max-width:860px;margin:0 auto;padding:32px 20px 60px;}

/* Profile header */
.profile-header{
  display:flex;align-items:flex-end;gap:24px;
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:24px;margin-bottom:24px;
  position:relative;overflow:hidden;
}
.profile-header::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,#5865f214 0%,transparent 60%);
  pointer-events:none;
}
.avatar-wrap{position:relative;flex-shrink:0;}
.mc-avatar{
  height:100px;width:auto;image-rendering:pixelated;
  border-radius:6px;display:block;
}
.mc-avatar-head{
  width:80px;height:80px;image-rendering:pixelated;
  border-radius:8px;display:block;
}
.profile-info{display:flex;flex-direction:column;gap:6px;z-index:1;}
.profile-name{font-size:1.8rem;font-weight:800;color:#fff;letter-spacing:.3px;}
.profile-sub{font-size:.8rem;color:var(--muted);}

/* Section headers */
.section-title{
  font-size:.7rem;font-weight:700;letter-spacing:1.4px;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

/* Gamemode cards grid */
#tiers-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;margin-bottom:32px;
}
.gm-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:16px 14px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transition:border-color .15s,background .15s;
}
.gm-card:hover{background:var(--card2);}
.gm-unranked{opacity:.5;}
.gm-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.gm-icon svg,.muted-icon svg{width:100%;height:100%;}
.gm-label{font-size:.78rem;font-weight:600;color:var(--muted);letter-spacing:.3px;}
.gm-tier{
  font-size:.75rem;font-weight:800;letter-spacing:.8px;
  padding:3px 10px;border-radius:5px;border:1px solid;
}
.unranked-tier{background:#1e2336;color:#3a4060;border-color:#252a3e;}
.gm-tier-name{font-size:.72rem;font-weight:600;text-align:center;}
#no-tiers-note{
  display:none;color:var(--muted);font-size:.82rem;
  font-style:italic;margin-bottom:24px;
}

/* History */
.history-section{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.history-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:.7rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);display:grid;grid-template-columns:110px 130px 1fr;gap:12px;}
.history-entry{
  display:grid;grid-template-columns:110px 130px 1fr;
  gap:12px;align-items:center;
  padding:12px 18px;border-top:1px solid var(--border);
  transition:background .1s;
}
.history-entry:first-child{border-top:none;}
.history-entry:hover{background:var(--card2);}
.he-date{display:flex;flex-direction:column;gap:2px;}
.he-datestr{font-size:.78rem;font-weight:600;color:var(--text);}
.he-timestr{font-size:.68rem;color:var(--muted);}
.he-gm{display:flex;align-items:center;gap:7px;font-size:.82rem;font-weight:600;color:var(--text);}
.he-gm-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;}
.he-gm-icon svg{width:100%;height:100%;}
.he-change{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tier-pill{font-size:.7rem;font-weight:800;letter-spacing:.5px;padding:3px 8px;border-radius:4px;border:1px solid;white-space:nowrap;}
.unranked-pill{background:#1e2336;color:#4e5570;border-color:#252a3e;}
.he-arrow{font-size:1rem;font-weight:700;}
.empty-history{padding:32px;text-align:center;color:var(--muted);font-style:italic;font-size:.85rem;}
.error-state{padding:60px;text-align:center;color:var(--muted);font-size:.9rem;}

@media(max-width:600px){
  #tiers-grid{grid-template-columns:repeat(2,1fr);}
  .history-header,.history-entry{grid-template-columns:85px 100px 1fr;gap:8px;padding:10px 12px;}
  .profile-name{font-size:1.3rem;}
}
@media(max-width:420px){
  #tiers-grid{grid-template-columns:1fr 1fr;}
  .history-header{display:none;}
  .history-entry{grid-template-columns:1fr;gap:4px;padding:12px;}
}
</style>
</head>
<body>

<div class="top-bar">
  <a class="back-link" href="/">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to Rankings
  </a>
  <span class="top-title">⚔ PVPTIERS</span>
</div>

<div class="page" id="content">
  <!-- Profile header -->
  <div class="profile-header">
    <div class="avatar-wrap">
      <img class="mc-avatar" id="mc-avatar" src="" alt="skin"
           onerror="this.style.display='none';document.getElementById('mc-avatar-head').style.display='block'">
      <img class="mc-avatar-head" id="mc-avatar-head" src="" alt="head" style="display:none">
    </div>
    <div class="profile-info">
      <div class="profile-name" id="player-name">Loading…</div>
      <div class="profile-sub">PVP Tiers Profile</div>
    </div>
  </div>

  <!-- Current tiers -->
  <div class="section-title">Current Tiers</div>
  <p id="no-tiers-note">This player has no tiers in any gamemode.</p>
  <div id="tiers-grid"></div>

  <!-- Tier history -->
  <div class="section-title">Tier Change History</div>
  <div class="history-section">
    <div class="history-header">
      <span>Date</span>
      <span>Gamemode</span>
      <span>Change</span>
    </div>
    <div id="history-list">
      <div class="empty-history">Loading history…</div>
    </div>
  </div>
</div>

</body>
</html>
