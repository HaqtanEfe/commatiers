<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVP Tiers</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDdz5u46Q8IIOEmfUOSmCxKBnoE52A7y34",
    authDomain: "friendstierlist-9a5fb.firebaseapp.com",
    projectId: "friendstierlist-9a5fb",
    storageBucket: "friendstierlist-9a5fb.firebasestorage.app",
    messagingSenderId: "774591972842",
    appId: "1:774591972842:web:d414a35464b4742fa21e93"
  };

  const ADMIN_PASSWORD = "HaqtanEfe";

  // =====================================================
  // 🖼️ CUSTOM ICONS — set a path/URL or leave null
  // =====================================================
  const ICONS = {
    // Tab / gamemode icons
    overall:  "icons/overall.png",   // e.g. "icons/overall.png"
    crystal:  "icons/crystal.png",
    sword:    "icons/sword.png",
    smp:      "icons/smp.png",
    uhc:      "icons/uhc.png",
    mace:     "icons/mace.png",
    axe:      "icons/axe.png",
    // Title icons (shown next to player title in overall)
    title_grandmaster: "icons/grandmaster.png",  // e.g. "icons/grandmaster.png"
    title_master:      "icons/master.png",
    title_ace:         "icons/ace.png",
    title_specialist:  "icons/specialist.png",
    title_cadet:       "icons/cadet.png",
    title_novice:      "icons/novice.png",
    title_rookie:      "icons/rookie.png",
  };

  const GAMEMODES = [
    { id: "crystal", label: "Crystal" },
    { id: "sword",   label: "Sword"   },
    { id: "smp",     label: "SMP"     },
    { id: "uhc",     label: "UHC"     },
    { id: "mace",    label: "Mace"    },
    { id: "axe",     label: "Axe"     },
  ];

  // Points per tier (HT = base, LT = base - bonus)
  const TIERS = [
    { id: "HT1", label: "High Tier 1", color: "#e63946", points: 60 },
    { id: "LT1", label: "Low Tier 1",  color: "#ff9aa2", points: 45 },
    { id: "HT2", label: "High Tier 2", color: "#f77f00", points: 30 },
    { id: "LT2", label: "Low Tier 2",  color: "#ffbe7a", points: 20 },
    { id: "HT3", label: "High Tier 3", color: "#2a9d8f", points: 10 },
    { id: "LT3", label: "Low Tier 3",  color: "#8fd3c7", points:  6 },
    { id: "HT4", label: "High Tier 4", color: "#457b9d", points:  4 },
    { id: "LT4", label: "Low Tier 4",  color: "#a8cbe0", points:  3 },
    { id: "HT5", label: "High Tier 5", color: "#6a4c93", points:  2 },
    { id: "LT5", label: "Low Tier 5",  color: "#c3aed6", points:  1 },
  ];
  const TIER_MAP = Object.fromEntries(TIERS.map(t => [t.id, t]));
  const TIER_RANK = Object.fromEntries(TIERS.map((t, i) => [t.id, i]));

  const TITLES = [
    { key: "grandmaster", min: 400, label: "Combat Grandmaster", color: "#f5c518",  fallback: "◈" },
    { key: "master",      min: 250, label: "Combat Master",       color: "#c8a84b",  fallback: "◈" },
    { key: "ace",         min: 100, label: "Combat Ace",          color: "#e05555",  fallback: "◆" },
    { key: "specialist",  min:  50, label: "Combat Specialist",   color: "#9b8dff",  fallback: "◇" },
    { key: "cadet",       min:  20, label: "Combat Cadet",        color: "#5a8fd4",  fallback: "◉" },
    { key: "novice",      min:  10, label: "Combat Novice",       color: "#5a8fd4",  fallback: "◎" },
    { key: "rookie",      min:   0, label: "Rookie",              color: "#667",     fallback: "◌" },
  ];

  function getTitle(pts) { return TITLES.find(t => pts >= t.min) || TITLES[TITLES.length - 1]; }

  function titleIconHtml(title) {
    const path = ICONS[`title_${title.key}`];
    if (path) return `<img src="${path}" style="width:14px;height:14px;object-fit:contain;vertical-align:middle">`;
    return `<span style="color:${title.color}">${title.fallback}</span>`;
  }

  function gmIconHtml(id, size = 20) {
    if (ICONS[id]) return `<img src="${ICONS[id]}" width="${size}" height="${size}" style="object-fit:contain">`;
    const svgs = {
      overall: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`,
      crystal: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12,2 22,9 18,21 6,21 2,9"/><line x1="12" y1="2" x2="12" y2="21"/><line x1="2" y1="9" x2="22" y2="9"/></svg>`,
      sword:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="2" x2="12" y2="18"/><path d="M8 6l4-4 4 4"/><path d="M9 18h6"/><path d="M10 21h4"/></svg>`,
      smp:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`,
      uhc:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
      mace:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="1" width="6" height="10" rx="2"/><rect x="5" y="3" width="14" height="6" rx="2"/><line x1="12" y1="11" x2="12" y2="23"/></svg>`,
      axe:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 12L5 21"/><path d="M14.5 4.5C12 2 8 2.5 6 5c-1.5 2-1 5 .5 7l8-8c-1-1.5-1.5-3-1-4.5z"/><path d="M14.5 4.5c1.5-1 3.5-.5 4.5 1 1.5 2 1 5-.5 7l-4-4"/></svg>`,
    };
    return `<span style="width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center">${svgs[id] || svgs.sword}</span>`;
  }

  function emptyState() {
    const tiers = {};
    GAMEMODES.forEach(gm => {
      tiers[gm.id] = {};
      TIERS.forEach(t => tiers[gm.id][t.id] = []);
    });
    return { players: [], tiers, retired: {} };
  }

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const REF = doc(db, "tierlist", "data");

  let state = emptyState(), isAdmin = false, activeGM = "overall";
  let dragPlayer = null, dragSrc = null;

  // context menu state
  let ctxPlayer = null, ctxTier = null;

  async function save() {
    try { await setDoc(REF, state); }
    catch(e) { toast("Save failed: " + e.message, true); }
  }

  onSnapshot(REF, snap => {
    if (snap.exists()) {
      const d = snap.data();
      if (!d.players)  d.players  = [];
      if (!d.tiers)    d.tiers    = {};
      if (!d.retired)  d.retired  = {};
      GAMEMODES.forEach(gm => {
        if (!d.tiers[gm.id]) d.tiers[gm.id] = {};
        if (!d.retired[gm.id]) d.retired[gm.id] = {};
        TIERS.forEach(t => {
          if (!d.tiers[gm.id][t.id])   d.tiers[gm.id][t.id]   = [];
          if (!d.retired[gm.id][t.id]) d.retired[gm.id][t.id] = [];
        });
      });
      state = d;
    }
    render();
  });

  // ── Helpers ────────────────────────────────────────
  function calcPoints(name) {
    let total = 0;
    GAMEMODES.forEach(gm => {
      TIERS.forEach(tier => {
        // active + retired both count
        const inActive  = (state.tiers[gm.id]?.[tier.id]   || []).includes(name);
        const inRetired = (state.retired[gm.id]?.[tier.id]  || []).includes(name);
        if (inActive || inRetired) total += tier.points;
      });
    });
    return total;
  }

  function bestTierOf(name, gmId) {
    for (const tier of TIERS) {
      if ((state.tiers[gmId]?.[tier.id] || []).includes(name)) return { tier, retired: false };
      if ((state.retired[gmId]?.[tier.id] || []).includes(name)) return { tier, retired: true };
    }
    return null;
  }

  // Returns gamemodes sorted best→worst for this player
  function sortedGamemodesFor(name) {
    return GAMEMODES.map(gm => {
      const r = bestTierOf(name, gm.id);
      return { gm, result: r, rank: r ? TIER_RANK[r.tier.id] : Infinity };
    }).filter(x => x.result).sort((a, b) => a.rank - b.rank);
  }

  function primaryGamemode(name) {
    const sorted = sortedGamemodesFor(name);
    return sorted.length ? sorted[0].gm : null;
  }

  // ── Render ─────────────────────────────────────────
  function render() {
    renderTabs();
    if (activeGM === "overall") renderOverall();
    else renderGamemode();
  }

  // ── Tab bar ────────────────────────────────────────
  function renderTabs() {
    const bar = document.getElementById("tab-bar");
    bar.innerHTML = "";
    const tabs = [{ id: "overall", label: "Overall" }, ...GAMEMODES];
    tabs.forEach(tab => {
      const btn = document.createElement("button");
      btn.className = "tab-btn" + (tab.id === activeGM ? " active" : "");
      btn.innerHTML = `<span class="tab-icon">${gmIconHtml(tab.id, 22)}</span><strong>${tab.label}</strong>`;
      btn.onclick = () => { activeGM = tab.id; render(); };
      bar.appendChild(btn);
    });
  }

  // ── Overall leaderboard ────────────────────────────
  function renderOverall() {
    const content = document.getElementById("main-content");
    content.innerHTML = "";

    const players = state.players || [];
    if (!players.length) {
      content.innerHTML = `<div class="empty-state">No players added yet.</div>`;
      return;
    }

    const ranked = players.map(name => ({
      name, points: calcPoints(name),
      primaryGM: primaryGamemode(name),
      sortedGMs: sortedGamemodesFor(name),
    })).sort((a, b) => b.points - a.points);

    // Header
    const hdr = document.createElement("div");
    hdr.className = "overall-header";
    hdr.innerHTML = `<span>#</span><span>Player</span><span class="oh-primary">Primary</span><span class="oh-tiers">Tiers</span>`;
    content.appendChild(hdr);

    let rank = 1;
    ranked.forEach((p, i) => {
      if (i > 0 && p.points < ranked[i-1].points) rank = i + 1;
      const title = getTitle(p.points);
      const primaryGM = p.primaryGM;
      const primaryResult = primaryGM ? bestTierOf(p.name, primaryGM.id) : null;

      const row = document.createElement("div");
      row.className = "overall-row";
      row.title = "Right-click for options";

      // ── Rank cell (mctiers style: colored bg + big skin) ──
      const rankBg = rank === 1 ? "linear-gradient(135deg,#6a4800,#c89010)"
                   : rank === 2 ? "linear-gradient(135deg,#303848,#505870)"
                   : rank === 3 ? "linear-gradient(135deg,#4a2200,#8a4a10)"
                   : "var(--card)";
      const rankCell = document.createElement("div");
      rankCell.className = "or-rank-cell";
      rankCell.style.background = rankBg;
      // Full body skin for top 3, just head for the rest
      if (rank <= 3) {
        rankCell.innerHTML = `
          <span class="rank-num rank-top">${rank}.</span>
          <img class="mc-body" src="https://minotar.net/body/${encodeURIComponent(p.name)}/50" onerror="this.src='https://minotar.net/body/MHF_Steve/50'">
        `;
      } else {
        rankCell.innerHTML = `
          <span class="rank-num rank-other">${rank}.</span>
          <img class="mc-head-sm" src="https://minotar.net/avatar/${encodeURIComponent(p.name)}/36" onerror="this.src='https://minotar.net/avatar/MHF_Steve/36'">
        `;
      }

      // ── Player info ──
      const playerCell = document.createElement("div");
      playerCell.className = "or-player-cell";
      playerCell.innerHTML = `
        <span class="or-name">${p.name}</span>
        <span class="or-title">${titleIconHtml(title)} <span style="color:${title.color};font-weight:600">${title.label}</span> <span class="or-pts">(${p.points} points)</span></span>
      `;

      // ── Primary gamemode badge ──
      const primaryCell = document.createElement("div");
      primaryCell.className = "or-primary-cell";
      if (primaryGM && primaryResult) {
        const tc = primaryResult.tier.color;
        primaryCell.innerHTML = `<span class="primary-badge" style="background:${tc}18;color:${tc};border-color:${tc}55">${primaryGM.label}</span>`;
      } else {
        primaryCell.innerHTML = `<span class="primary-badge unranked-badge">—</span>`;
      }

      // ── Tier circles — sorted best to worst ──
      const tiersCell = document.createElement("div");
      tiersCell.className = "or-tiers-cell";

      p.sortedGMs.forEach(({ gm, result }) => {
        const { tier, retired } = result;
        const tc = tier.color;
        const wrap = document.createElement("div");
        wrap.className = "tier-circle-wrap" + (retired ? " retired-wrap" : "");

        // Tooltip
        wrap.title = `${gm.label}: ${tier.label} (${tier.points} pts)${retired ? ' — Retired' : ''}`;

        wrap.innerHTML = `
          <div class="tier-circle" style="background:${tc}22;border-color:${tc}99${retired ? ';opacity:0.55;filter:grayscale(0.4)' : ''}">
            <span class="tc-gm-icon">${gmIconHtml(gm.id, 16)}</span>
          </div>
          <span class="tc-label" style="color:${retired ? '#667' : tc}">${tier.id}${retired ? '*' : ''}</span>
        `;
        tiersCell.appendChild(wrap);
      });

      if (!p.sortedGMs.length) {
        tiersCell.innerHTML = `<span style="color:var(--muted);font-size:0.75rem;font-style:italic">No tiers</span>`;
      }

      row.appendChild(rankCell);
      row.appendChild(playerCell);
      row.appendChild(primaryCell);
      row.appendChild(tiersCell);
      content.appendChild(row);

      // Right-click context menu on overall rows
      row.addEventListener("contextmenu", e => {
        e.preventDefault();
        showOverallCtx(e.pageX, e.pageY, p.name, title, p.points, p.sortedGMs);
      });
    });
  }

  // ── Per-gamemode view ──────────────────────────────
  function renderGamemode() {
    const content = document.getElementById("main-content");
    content.innerHTML = "";

    const grid = document.createElement("div");
    grid.id = "tier-grid";
    content.appendChild(grid);

    TIERS.forEach(tier => {
      const players  = state.tiers[activeGM]?.[tier.id] || [];
      const retiredP = state.retired[activeGM]?.[tier.id] || [];

      const col = document.createElement("div");
      col.className = "tier-col";

      const tcol = TIERS.find(t => t.id === tier.id).color;
      const headerBg = tier.id.startsWith('H')
        ? `linear-gradient(135deg,${tcol}18,${tcol}08)`
        : `linear-gradient(135deg,${tcol}0e,${tcol}04)`;

      const header = document.createElement("div");
      header.className = "tier-col-header";
      header.style.background = headerBg;
      header.style.borderBottom = `2px solid ${tcol}`;
      header.innerHTML = `
        <span class="trophy-icon" style="color:${tcol}">🏆</span>
        <span class="tier-col-title" style="color:${tcol}">${tier.label}</span>
        <span class="tier-pts-badge" style="background:${tcol}22;color:${tcol}">${tier.points}pt</span>
      `;
      col.appendChild(header);

      const list = document.createElement("div");
      list.className = "tier-col-list" + (isAdmin ? " admin-mode" : "");
      list.dataset.tier = tier.id;

      const allPlayers = [...players, ...retiredP.map(n => ({ name: n, retired: true }))];
      if (!players.length && !retiredP.length) {
        const empty = document.createElement("div");
        empty.className = "col-empty";
        empty.textContent = isAdmin ? "Drop here" : "—";
        list.appendChild(empty);
      } else {
        players.forEach(name => list.appendChild(makeRow(name, tier.id, false)));
        retiredP.forEach(name => list.appendChild(makeRow(name, tier.id, true)));
      }

      if (isAdmin) setupDrop(list, tier.id);
      col.appendChild(list);
      grid.appendChild(col);
    });

    // Unranked
    const inTiers   = new Set(TIERS.flatMap(t => state.tiers[activeGM]?.[t.id] || []));
    const inRetired = new Set(TIERS.flatMap(t => state.retired[activeGM]?.[t.id] || []));
    const unranked  = (state.players || []).filter(p => !inTiers.has(p) && !inRetired.has(p));

    if (isAdmin || unranked.length > 0) {
      const uWrap = document.createElement("div");
      uWrap.className = "unranked-wrap";
      uWrap.innerHTML = `<div class="unranked-title">Unranked</div>`;
      const uList = document.createElement("div");
      uList.className = "unranked-list" + (isAdmin ? " admin-mode" : "");
      uList.dataset.tier = "unranked";
      if (!unranked.length) {
        const e = document.createElement("div");
        e.className = "col-empty"; e.textContent = "All players are ranked";
        uList.appendChild(e);
      } else {
        unranked.forEach(p => uList.appendChild(makeRow(p, "unranked", false)));
      }
      if (isAdmin) setupDrop(uList, "unranked");
      uWrap.appendChild(uList);
      content.appendChild(uWrap);
    }
  }

  function makeRow(name, srcTier, retired) {
    const row = document.createElement("div");
    row.className = "player-row" + (retired ? " retired-row" : "");
    row.dataset.playerName = name; row.dataset.tier = srcTier;

    const head = document.createElement("img");
    head.className = "mc-head";
    head.src = `https://minotar.net/avatar/${encodeURIComponent(name)}/28`;
    head.onerror = () => head.src = "https://minotar.net/avatar/MHF_Steve/28";

    const nm = document.createElement("span");
    nm.className = "player-name"; nm.textContent = name;

    const retiredBadge = retired ? (() => {
      const s = document.createElement("span");
      s.className = "retired-badge"; s.textContent = "Retired";
      return s;
    })() : null;

    row.appendChild(head); row.appendChild(nm);
    if (retiredBadge) row.appendChild(retiredBadge);

    if (isAdmin) {
      if (!retired) {
        row.draggable = true;
        row.addEventListener("dragstart", e => {
          dragPlayer = name; dragSrc = srcTier;
          setTimeout(() => row.classList.add("dragging"), 0);
          e.dataTransfer.effectAllowed = "move";
        });
        row.addEventListener("dragend", () => row.classList.remove("dragging"));
      }

      row.addEventListener("contextmenu", e => {
        e.preventDefault(); e.stopPropagation();
        ctxPlayer = name; ctxTier = srcTier;
        showPlayerCtx(e.pageX, e.pageY, name, srcTier, retired);
      });
    }
    return row;
  }

  function setupDrop(el, targetTier) {
    el.addEventListener("dragover",  e => { e.preventDefault(); el.classList.add("drop-over"); });
    el.addEventListener("dragleave", () => el.classList.remove("drop-over"));
    el.addEventListener("drop", e => {
      e.preventDefault(); el.classList.remove("drop-over");
      if (!dragPlayer || !isAdmin) return;
      if (dragSrc !== "unranked")
        state.tiers[activeGM][dragSrc] = state.tiers[activeGM][dragSrc].filter(p => p !== dragPlayer);
      if (targetTier !== "unranked" && !state.tiers[activeGM][targetTier].includes(dragPlayer))
        state.tiers[activeGM][targetTier].push(dragPlayer);
      save(); dragPlayer = null; dragSrc = null;
    });
  }

  // ── Context menus ──────────────────────────────────
  function hideCtx() {
    document.getElementById("ctx-player").style.display = "none";
    document.getElementById("ctx-overall").style.display = "none";
  }

  // In-gamemode right-click: retire / remove
  function showPlayerCtx(x, y, name, tier, retired) {
    const menu = document.getElementById("ctx-player");
    const retireBtn = document.getElementById("ctx-retire");
    const unretireBtn = document.getElementById("ctx-unretire");
    retireBtn.style.display   = (!retired && tier !== "unranked") ? "flex" : "none";
    unretireBtn.style.display = retired ? "flex" : "none";
    posMenu(menu, x, y);
  }

  // Overall right-click: copy info
  function showOverallCtx(x, y, name, title, points, sortedGMs) {
    const menu = document.getElementById("ctx-overall");
    menu.dataset.copy = JSON.stringify({ name, title: title.label, points, gms: sortedGMs.map(s => ({
      gm: s.gm.label, tier: s.result.tier.id, pts: s.result.tier.points, retired: s.result.retired
    })) });
    posMenu(menu, x, y);
  }

  function posMenu(menu, x, y) {
    hideCtx();
    menu.style.display = "flex";
    // Keep within viewport
    const vw = window.innerWidth, vh = window.innerHeight;
    let lx = x, ly = y;
    if (lx + 180 > vw) lx = vw - 185;
    if (ly + menu.offsetHeight + 20 > vh) ly = y - menu.offsetHeight;
    menu.style.left = lx + "px"; menu.style.top = ly + "px";
  }

  window.ctxRetire = function() {
    if (!ctxPlayer || !ctxTier || ctxTier === "unranked") return;
    // Move from active to retired
    state.tiers[activeGM][ctxTier] = state.tiers[activeGM][ctxTier].filter(p => p !== ctxPlayer);
    if (!state.retired[activeGM]) state.retired[activeGM] = {};
    if (!state.retired[activeGM][ctxTier]) state.retired[activeGM][ctxTier] = [];
    if (!state.retired[activeGM][ctxTier].includes(ctxPlayer))
      state.retired[activeGM][ctxTier].push(ctxPlayer);
    save(); hideCtx();
  };

  window.ctxUnretire = function() {
    if (!ctxPlayer || !ctxTier) return;
    state.retired[activeGM][ctxTier] = state.retired[activeGM][ctxTier].filter(p => p !== ctxPlayer);
    if (!state.tiers[activeGM][ctxTier].includes(ctxPlayer))
      state.tiers[activeGM][ctxTier].push(ctxPlayer);
    save(); hideCtx();
  };

  window.ctxRemove = function() {
    if (!ctxPlayer) return;
    if (!confirm(`Remove "${ctxPlayer}" from all tier lists?`)) return;
    state.players = state.players.filter(p => p !== ctxPlayer);
    GAMEMODES.forEach(gm => TIERS.forEach(t => {
      state.tiers[gm.id][t.id]   = (state.tiers[gm.id][t.id]   || []).filter(p => p !== ctxPlayer);
      state.retired[gm.id][t.id] = (state.retired[gm.id][t.id] || []).filter(p => p !== ctxPlayer);
    }));
    save(); hideCtx();
  };

  window.ctxCopy = function() {
    const menu = document.getElementById("ctx-overall");
    const d = JSON.parse(menu.dataset.copy || "{}");
    if (!d.name) return;
    const lines = [
      `${d.name} — ${d.title} (${d.points} pts)`,
      ...d.gms.map(g => `  ${g.gm}: ${g.tier} (${g.pts} pts)${g.retired ? ' [Retired]' : ''}`)
    ];
    navigator.clipboard.writeText(lines.join("\n"))
      .then(() => toast("Copied ✓"))
      .catch(() => toast("Copy failed", true));
    hideCtx();
  };

  // Close menus on outside click
  document.addEventListener("click", e => {
    if (!document.getElementById("ctx-player").contains(e.target) &&
        !document.getElementById("ctx-overall").contains(e.target)) hideCtx();
  });

  // ── Admin ──────────────────────────────────────────
  window.tryLogin = () => {
    if (document.getElementById("pw-input").value === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById("login-modal").style.display = "none";
      document.getElementById("admin-toolbar").style.display = "flex";
      document.getElementById("admin-badge").style.display = "inline-flex";
      toast("Admin mode enabled ✓"); render();
    } else { document.getElementById("pw-error").style.display = "block"; }
  };
  window.openLogin  = () => { document.getElementById("login-modal").style.display = "flex"; setTimeout(() => document.getElementById("pw-input").focus(), 50); };
  window.closeLogin = () => document.getElementById("login-modal").style.display = "none";
  window.addPlayer  = () => {
    const inp = document.getElementById("player-input");
    const name = inp.value.trim();
    if (!name) return;
    if ((state.players || []).map(p => p.toLowerCase()).includes(name.toLowerCase())) { toast("Already exists!", true); return; }
    state.players.push(name); inp.value = ""; save();
  };
  window.handleKey = e => { if (e.key === "Enter") window.addPlayer(); };

  function toast(msg, err = false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show" + (err ? " err" : "");
    clearTimeout(t._t);
    t._t = setTimeout(() => t.className = "toast", 2500);
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") window.tryLogin(); });
  });
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f1117;
  --card:      #171b27;
  --card2:     #1c2035;
  --row-bg:    #1a1e2e;
  --row-hover: #21263a;
  --border:    #252a3e;
  --text:      #dde0ee;
  --muted:     #55607a;
  --accent:    #5865f2;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Nav ─────────────────────────────── */
.top-nav {
  height: 54px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px; gap: 12px;
  flex-shrink: 0; position: sticky; top: 0; z-index: 50;
}
.site-logo { font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: 1px; flex-shrink: 0; }
.nav-right  { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.admin-btn  {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  border-radius: 6px; padding: 5px 12px; font-size: 0.75rem; font-weight: 500;
  cursor: pointer; font-family: 'Inter', sans-serif; transition: color .1s, border-color .1s;
}
.admin-btn:hover { color: var(--text); border-color: #445; }
#admin-badge { display: none; align-items: center; gap: 4px; font-size: 0.68rem; font-weight: 600; color: #4cde82; }
.badge-dot { width: 5px; height: 5px; border-radius: 50%; background: #4cde82; }

/* ── Admin toolbar ───────────────────── */
#admin-toolbar {
  display: none; align-items: center; gap: 8px; padding: 8px 20px;
  background: rgba(88,101,242,0.07); border-bottom: 1px solid rgba(88,101,242,0.18);
  flex-wrap: wrap; flex-shrink: 0;
}
#admin-toolbar > .lbl { font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }
#player-input {
  background: var(--card2); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 0.83rem; outline: none; width: 200px;
}
#player-input:focus { border-color: var(--accent); }
.btn-add {
  background: var(--accent); color: #fff; border: none; border-radius: 6px;
  padding: 6px 14px; font-family: 'Inter', sans-serif; font-size: 0.82rem;
  font-weight: 600; cursor: pointer; transition: opacity .12s;
}
.btn-add:hover { opacity: 0.85; }
.admin-hint { font-size: 0.7rem; color: var(--muted); margin-left: auto; }

/* ── Page ────────────────────────────── */
.page-wrap { flex: 1; max-width: 1300px; margin: 0 auto; width: 100%; padding: 28px 18px 60px; overflow: hidden; }

/* ── Tabs ────────────────────────────── */
#tab-bar {
  display: flex; gap: 4px;
  overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none; -ms-overflow-style: none;
}
#tab-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  gap: 5px; padding: 10px 18px 11px;
  background: var(--card); border: 2px solid var(--border); border-bottom: none;
  border-radius: 20px 20px 0 0; color: #5a6480;
  font-family: 'Inter', sans-serif; font-size: 0.76rem; font-weight: 700;
  cursor: pointer; transition: color .12s, background .12s;
  white-space: nowrap; position: relative; bottom: -2px; min-width: 70px;
}
.tab-btn:hover { color: #9aa0c0; background: var(--card2); }
.tab-btn.active { color: #fff; background: var(--card2); border-color: var(--border); }
.tab-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: var(--card2);
}
.tab-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; color: inherit; }
.tab-icon svg { width: 100%; height: 100%; }

/* ── Main card ───────────────────────── */
.main-card {
  background: var(--card2); border: 2px solid var(--border);
  border-radius: 0 16px 16px 16px; padding: 18px; min-height: 400px;
}

/* ── Tier columns ────────────────────── */
#tier-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
}
.tier-col { background: var(--row-bg); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.tier-col-header {
  display: flex; align-items: center; justify-content: center;
  gap: 7px; padding: 12px 8px;
}
.trophy-icon { font-size: 1rem; }
.tier-col-title { font-size: 0.85rem; font-weight: 700; }
.tier-pts-badge { font-size: 0.62rem; font-weight: 700; padding: 2px 5px; border-radius: 4px; margin-left: 2px; }

/* ── Player rows ─────────────────────── */
.tier-col-list { display: flex; flex-direction: column; min-height: 60px; }
.tier-col-list.drop-over { outline: 2px dashed var(--accent); outline-offset: -2px; }
.player-row {
  display: flex; align-items: center; gap: 8px; padding: 7px 10px;
  background: var(--row-bg); border-top: 1px solid var(--border);
  cursor: default; transition: background .1s; position: relative;
}
.player-row:first-child { border-top: none; }
.tier-col-list.admin-mode .player-row:not(.retired-row) { cursor: grab; }
.player-row:hover { background: var(--row-hover); }
.player-row.dragging { opacity: 0.25; }
.retired-row { opacity: 0.55; }
.mc-head { width: 24px; height: 24px; border-radius: 3px; image-rendering: pixelated; flex-shrink: 0; }
.player-name { flex: 1; font-size: 0.85rem; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.retired-badge {
  font-size: 0.58rem; font-weight: 700; letter-spacing: 0.5px;
  background: #4a3a10; color: #c89040; border: 1px solid #8a6020;
  border-radius: 3px; padding: 1px 5px; flex-shrink: 0;
}
.col-empty { padding: 14px 10px; font-size: 0.75rem; color: var(--muted); font-style: italic; text-align: center; }

/* ── Unranked ────────────────────────── */
.unranked-wrap { background: var(--row-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-top: 12px; }
.unranked-title { padding: 8px 14px; font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
.unranked-list { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 12px; min-height: 50px; }
.unranked-list .player-row { border: 1px solid var(--border); border-radius: 5px; width: auto; flex: none; border-top: 1px solid var(--border); }
.unranked-list.drop-over { outline: 2px dashed var(--accent); outline-offset: -2px; border-radius: 8px; }

/* ── Overall leaderboard ─────────────── */
.empty-state { padding: 60px; text-align: center; color: var(--muted); font-style: italic; }
.overall-header {
  display: grid; grid-template-columns: 200px 1fr 110px 1fr;
  gap: 10px; padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 0.66rem; font-weight: 700; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
}
.oh-primary { text-align: center; }
.oh-tiers   { text-align: left; }

.overall-row {
  display: grid; grid-template-columns: 200px 1fr 110px 1fr;
  gap: 10px; align-items: center;
  margin-bottom: 5px; border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  background: var(--row-bg); transition: background .12s; cursor: default;
}
.overall-row:hover { background: var(--row-hover); }

/* Rank cell */
.or-rank-cell {
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; min-height: 72px; overflow: hidden; position: relative;
}
.rank-num { font-size: 1.4rem; font-weight: 800; flex-shrink: 0; z-index: 1; }
.rank-top   { color: rgba(255,255,255,0.95); }
.rank-other { color: var(--muted); font-size: 1.1rem; }

/* Full body skin for top 3 (mctiers style) */
.mc-body {
  height: 72px; width: auto;
  image-rendering: pixelated;
  object-fit: contain; object-position: top;
  flex-shrink: 0; z-index: 1;
}
.mc-head-sm {
  width: 36px; height: 36px;
  border-radius: 4px; image-rendering: pixelated; flex-shrink: 0; z-index: 1;
}

/* Player info */
.or-player-cell { display: flex; flex-direction: column; gap: 4px; padding: 12px 0; min-width: 0; }
.or-name  { font-size: 1rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.or-title { font-size: 0.76rem; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.or-pts   { color: var(--muted); font-size: 0.72rem; }

/* Primary badge */
.or-primary-cell { display: flex; align-items: center; justify-content: center; }
.primary-badge {
  font-size: 0.72rem; font-weight: 700; padding: 4px 10px;
  border-radius: 6px; border: 1px solid; white-space: nowrap;
}
.unranked-badge { color: var(--muted); background: transparent; border-color: var(--border); }

/* Tier circles — mctiers style: dark circle bg, icon inside, label below */
.or-tiers-cell { display: flex; gap: 5px; align-items: flex-start; flex-wrap: wrap; padding: 10px 6px; }
.tier-circle-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; position: relative; }
.tier-circle-wrap:hover .tier-tooltip { opacity: 1; pointer-events: auto; transform: translateY(0); }

.tier-circle {
  width: 38px; height: 38px; border-radius: 50%; border: 2px solid;
  display: flex; align-items: center; justify-content: center;
  background: #111520; /* dark circle like mctiers */
  transition: filter .15s;
}
.tier-circle:hover { filter: brightness(1.2); }
.tc-gm-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
.tc-gm-icon svg { width: 100%; height: 100%; }
.tc-gm-icon img { width: 100%; height: 100%; object-fit: contain; }
.tc-label { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.5px; text-align: center; }

/* Tooltip on hover */
.tier-tooltip {
  position: absolute; bottom: calc(100% + 8px); left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: #1e2235; border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 10px;
  font-size: 0.72rem; font-weight: 600; color: var(--text);
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity .15s, transform .15s;
  z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.tier-tooltip .tt-pts { color: var(--muted); font-weight: 400; }

.retired-wrap .tier-circle { filter: grayscale(0.5); }

/* ── Context menus ───────────────────── */
.ctx-menu {
  position: fixed; background: #1e2235; border: 1px solid var(--border);
  border-radius: 8px; padding: 5px;
  min-width: 170px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  z-index: 1000; display: none; flex-direction: column; gap: 2px;
}
.ctx-item {
  padding: 8px 12px; cursor: pointer; color: var(--text);
  font-size: 0.8rem; font-weight: 500; border-radius: 5px;
  transition: background .12s; display: flex; align-items: center; gap: 8px;
}
.ctx-item:hover { background: var(--row-hover); }
.ctx-item.danger { color: #e05555; }
.ctx-item.danger:hover { background: rgba(224,85,85,0.1); }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

/* ── Modal ───────────────────────────── */
#login-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  z-index: 300; align-items: center; justify-content: center; backdrop-filter: blur(5px);
}
.modal-box {
  background: #12141e; border: 1px solid var(--border); border-radius: 12px;
  padding: 28px; width: 320px; display: flex; flex-direction: column; gap: 12px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.7);
}
.modal-box h2 { font-size: 1rem; font-weight: 700; color: #fff; }
.modal-box p  { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
.modal-box input {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 11px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 0.88rem; outline: none; width: 100%;
}
.modal-box input:focus { border-color: var(--accent); }
#pw-error { display: none; font-size: 0.75rem; color: #e05050; }
.modal-btns { display: flex; gap: 7px; }
.modal-btns button {
  flex: 1; padding: 8px; border-radius: 6px; font-family: 'Inter', sans-serif;
  font-size: 0.83rem; font-weight: 600; cursor: pointer; border: none;
}
.btn-confirm { background: var(--accent); color: #fff; }
.btn-confirm:hover { opacity: 0.85; }
.btn-cancel { background: #1e2130; color: var(--muted); border: 1px solid var(--border) !important; }
.btn-cancel:hover { color: var(--text); }

/* ── Toast ───────────────────────────── */
.toast {
  position: fixed; bottom: 20px; right: 20px; background: #22aa55; color: #fff;
  font-size: 0.8rem; font-weight: 600; padding: 9px 16px; border-radius: 6px;
  opacity: 0; transform: translateY(6px); transition: opacity .18s, transform .18s;
  z-index: 999; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.err  { background: #c0392b; }

/* ── Responsive ──────────────────────── */
@media (max-width: 1000px) {
  .overall-header, .overall-row { grid-template-columns: 160px 1fr 90px auto; }
}
@media (max-width: 800px) {
  #tier-grid { grid-template-columns: repeat(3, 1fr); }
  .overall-header, .overall-row { grid-template-columns: 130px 1fr auto; }
  .oh-primary, .or-primary-cell { display: none; }
}
@media (max-width: 540px) {
  #tier-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="site-logo">⚔ PVPTIERS</div>
  <div class="nav-right">
    <span id="admin-badge"><span class="badge-dot"></span> ADMIN</span>
    <button class="admin-btn" onclick="openLogin()">⚙ Admin</button>
  </div>
</nav>

<div id="admin-toolbar">
  <span class="lbl">● Admin</span>
  <input type="text" id="player-input" placeholder="Minecraft username..." onkeydown="handleKey(event)" maxlength="24">
  <button class="btn-add" onclick="addPlayer()">+ Add Player</button>
  <span class="admin-hint">Drag to rank · Right-click for options</span>
</div>

<div class="page-wrap">
  <div id="tab-bar"></div>
  <div class="main-card">
    <div id="main-content"></div>
  </div>
</div>

<!-- In-gamemode context menu -->
<div id="ctx-player" class="ctx-menu">
  <div class="ctx-item" id="ctx-retire"   onclick="ctxRetire()">  🕰 Retire this rank</div>
  <div class="ctx-item" id="ctx-unretire" onclick="ctxUnretire()">♻ Un-retire rank</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger"            onclick="ctxRemove()">  🗑 Remove player</div>
</div>

<!-- Overall context menu -->
<div id="ctx-overall" class="ctx-menu">
  <div class="ctx-item" onclick="ctxCopy()">📋 Copy player info</div>
</div>

<!-- Login modal -->
<div id="login-modal">
  <div class="modal-box">
    <h2>Admin Login</h2>
    <p>Enter your password to manage the tier list.</p>
    <input type="password" id="pw-input" placeholder="Password...">
    <div id="pw-error">Incorrect password. Try again.</div>
    <div class="modal-btns">
      <button class="btn-confirm" onclick="tryLogin()">Login</button>
      <button class="btn-cancel"  onclick="closeLogin()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
</body>
</html>
