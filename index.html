<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVP Tiers</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDdz5u46Q8IIOEmfUOSmCxKBnoE52A7y34",
    authDomain: "friendstierlist-9a5fb.firebaseapp.com",
    projectId: "friendstierlist-9a5fb",
    storageBucket: "friendstierlist-9a5fb.firebasestorage.app",
    messagingSenderId: "774591972842",
    appId: "1:774591972842:web:d414a35464b4742fa21e93"
  };

  const ADMIN_PASSWORD = "HaqtanEfe";

  const GAMEMODES = [
    { id: "crystal", label: "Crystal" },
    { id: "sword",   label: "Sword" },
    { id: "smp",     label: "SMP" },
    { id: "uhc",     label: "UHC" },
    { id: "mace",    label: "Mace" },
    { id: "axe",     label: "Axe" },
  ];

  const TIERS = [
    { id: "T1", label: "Tier 1", color: "#c8a84b", headerBg: "#2a2010", headerText: "#e8c96a" },
    { id: "T2", label: "Tier 2", color: "#888ea0", headerBg: "#1e2028", headerText: "#b0b8cc" },
    { id: "T3", label: "Tier 3", color: "#a0663a", headerBg: "#241a10", headerText: "#c88050" },
    { id: "T4", label: "Tier 4", color: "#5a6070", headerBg: "#181c24", headerText: "#8090aa" },
    { id: "T5", label: "Tier 5", color: "#4a5060", headerBg: "#14181e", headerText: "#6a7888" },
  ];

  function emptyState() {
    const tiers = {};
    const tierLevels = {};
    GAMEMODES.forEach(gm => {
      tiers[gm.id] = {};
      tierLevels[gm.id] = {};
      TIERS.forEach(t => {
        tiers[gm.id][t.id] = [];
        tierLevels[gm.id][t.id] = {};
      });
    });
    return { players: [], tiers, tierLevels };
  }

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const REF = doc(db, "tierlist", "data");

  let state      = emptyState();
  let isAdmin    = false;
  let activeGM   = GAMEMODES[0].id;
  let dragPlayer = null;
  let dragSrc    = null;
  let contextMenuTarget = null;

  async function save() {
    try { await setDoc(REF, state); }
    catch(e) { toast("Save failed: " + e.message, true); }
  }

  onSnapshot(REF, snap => {
    if (snap.exists()) {
      const d = snap.data();
      if (!d.players) d.players = [];
      if (!d.tiers)   d.tiers   = {};
      if (!d.tierLevels) d.tierLevels = {};
      GAMEMODES.forEach(gm => {
        if (!d.tiers[gm.id]) d.tiers[gm.id] = {};
        if (!d.tierLevels[gm.id]) d.tierLevels[gm.id] = {};
        TIERS.forEach(t => { 
          if (!d.tiers[gm.id][t.id]) d.tiers[gm.id][t.id] = []; 
          if (!d.tierLevels[gm.id][t.id]) d.tierLevels[gm.id][t.id] = {};
        });
      });
      state = d;
    }
    render();
  });

  function render() {
    renderTabs();
    renderColumns();
  }

  function renderTabs() {
    const bar = document.getElementById("tab-bar");
    bar.innerHTML = "";
    GAMEMODES.forEach(gm => {
      const btn = document.createElement("button");
      btn.className = "tab-btn" + (gm.id === activeGM ? " active" : "");
      btn.innerHTML = `<span class="tab-icon">${gmIcon(gm.id)}</span><span class="tab-label">${gm.label}</span>`;
      btn.onclick = () => { activeGM = gm.id; render(); };
      bar.appendChild(btn);
    });
  }

  function renderColumns() {
    const grid = document.getElementById("tier-grid");
    grid.innerHTML = "";

    TIERS.forEach(tier => {
      const players = state.tiers[activeGM]?.[tier.id] || [];
      const tierLevelData = state.tierLevels?.[activeGM]?.[tier.id] || {};

      const col = document.createElement("div");
      col.className = "tier-col";

      const header = document.createElement("div");
      header.className = "tier-col-header";
      header.style.background = tier.headerBg;
      header.style.borderBottom = `2px solid ${tier.color}`;
      header.innerHTML = `
        <span class="trophy-icon" style="color:${tier.headerText}">🏆</span>
        <span class="tier-col-title" style="color:${tier.headerText}">${tier.label}</span>
      `;
      col.appendChild(header);

      const list = document.createElement("div");
      list.className = "tier-col-list" + (isAdmin ? " admin-mode" : "");
      list.dataset.tier = tier.id;

      if (players.length === 0) {
        const empty = document.createElement("div");
        empty.className = "col-empty";
        empty.textContent = isAdmin ? "Drop here" : "—";
        list.appendChild(empty);
      } else {
        players.forEach(name => {
          const level = tierLevelData[name] || null;
          list.appendChild(makeRow(name, tier.id, level));
        });
      }

      if (isAdmin) setupDrop(list, tier.id);
      col.appendChild(list);
      grid.appendChild(col);
    });

    const inTiers = new Set(TIERS.flatMap(t => state.tiers[activeGM]?.[t.id] || []));
    const unranked = (state.players || []).filter(p => !inTiers.has(p));

    if (isAdmin || unranked.length > 0) {
      const uWrap = document.createElement("div");
      uWrap.className = "unranked-wrap";
      uWrap.innerHTML = `<div class="unranked-title">Unranked</div>`;

      const uList = document.createElement("div");
      uList.className = "unranked-list" + (isAdmin ? " admin-mode" : "");
      uList.dataset.tier = "unranked";

      if (unranked.length === 0) {
        const e = document.createElement("div");
        e.className = "col-empty";
        e.textContent = "All players are ranked";
        uList.appendChild(e);
      } else {
        unranked.forEach(p => uList.appendChild(makeRow(p, "unranked", null)));
      }

      if (isAdmin) setupDrop(uList, "unranked");
      uWrap.appendChild(uList);
      document.getElementById("unranked-section").innerHTML = "";
      document.getElementById("unranked-section").appendChild(uWrap);
    } else {
      document.getElementById("unranked-section").innerHTML = "";
    }
  }

  function makeRow(name, srcTier, tierLevel) {
    const row = document.createElement("div");
    row.className = "player-row";
    row.dataset.playerName = name;
    row.dataset.tier = srcTier;

    const head = document.createElement("img");
    head.className = "mc-head";
    head.src = `https://minotar.net/avatar/${encodeURIComponent(name)}/28`;
    head.onerror = () => head.src = "https://minotar.net/avatar/MHF_Steve/28";

    const nm = document.createElement("span");
    nm.className = "player-name";
    nm.textContent = name;

    const indicator = document.createElement("span");
    indicator.className = "tier-indicator";
    if (tierLevel === 'high') {
      indicator.innerHTML = '▲';
      indicator.classList.add('high-tier');
      indicator.title = 'High Tier';
    } else if (tierLevel === 'low') {
      indicator.innerHTML = '▼';
      indicator.classList.add('low-tier');
      indicator.title = 'Low Tier';
    }

    row.appendChild(head);
    row.appendChild(nm);
    row.appendChild(indicator);

    if (isAdmin) {
      row.draggable = true;
      row.addEventListener("dragstart", e => {
        dragPlayer = name; dragSrc = srcTier;
        setTimeout(() => row.classList.add("dragging"), 0);
        e.dataTransfer.effectAllowed = "move";
      });
      row.addEventListener("dragend", () => row.classList.remove("dragging"));
      
      row.addEventListener("contextmenu", e => {
        e.preventDefault();
        e.stopPropagation();
        if (srcTier === "unranked") {
          if (confirm(`Remove "${name}" from all tier lists?`)) {
            state.players = state.players.filter(p => p !== name);
            GAMEMODES.forEach(gm => TIERS.forEach(t => {
              state.tiers[gm.id][t.id] = state.tiers[gm.id][t.id].filter(p => p !== name);
              if (state.tierLevels[gm.id][t.id][name]) {
                delete state.tierLevels[gm.id][t.id][name];
              }
            }));
            save();
          }
        } else {
          contextMenuTarget = { name, tier: srcTier, row };
          showContextMenu(e.pageX, e.pageY, tierLevel);
        }
      });
    }
    return row;
  }

  function showContextMenu(x, y, currentLevel) {
    const menu = document.getElementById("context-menu");
    const htOption = document.getElementById("ctx-high-tier");
    const ltOption = document.getElementById("ctx-low-tier");
    const clearOption = document.getElementById("ctx-clear-tier");
    
    htOption.classList.toggle('active', currentLevel === 'high');
    ltOption.classList.toggle('active', currentLevel === 'low');
    clearOption.style.display = currentLevel ? 'block' : 'none';
    
    menu.style.display = 'block';
    menu.style.left = x + 'px';
    menu.style.top = y + 'px';
  }

  function hideContextMenu() {
    document.getElementById("context-menu").style.display = 'none';
    contextMenuTarget = null;
  }

  window.setTierLevel = function(level) {
    if (!contextMenuTarget) return;
    const { name, tier } = contextMenuTarget;
    
    if (!state.tierLevels[activeGM]) state.tierLevels[activeGM] = {};
    if (!state.tierLevels[activeGM][tier]) state.tierLevels[activeGM][tier] = {};
    
    if (level) {
      state.tierLevels[activeGM][tier][name] = level;
    } else {
      delete state.tierLevels[activeGM][tier][name];
    }
    
    save();
    hideContextMenu();
  };

  function setupDrop(el, targetTier) {
    el.addEventListener("dragover",  e => { e.preventDefault(); el.classList.add("drop-over"); });
    el.addEventListener("dragleave", () => el.classList.remove("drop-over"));
    el.addEventListener("drop", e => {
      e.preventDefault(); el.classList.remove("drop-over");
      if (!dragPlayer || !isAdmin) return;
      if (dragSrc !== "unranked")
        state.tiers[activeGM][dragSrc] = state.tiers[activeGM][dragSrc].filter(p => p !== dragPlayer);
      if (targetTier !== "unranked" && !state.tiers[activeGM][targetTier].includes(dragPlayer)) {
        state.tiers[activeGM][targetTier].push(dragPlayer);
        if (dragSrc !== "unranked" && dragSrc !== targetTier) {
          if (state.tierLevels[activeGM][dragSrc]?.[dragPlayer]) {
            delete state.tierLevels[activeGM][dragSrc][dragPlayer];
          }
        }
      }
      save(); dragPlayer = null; dragSrc = null;
    });
  }

  function gmIcon(id) {
    const m = {
      crystal: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polygon points="12,2 22,9 18,21 6,21 2,9"/><line x1="12" y1="2" x2="12" y2="21"/><line x1="2" y1="9" x2="22" y2="9"/></svg>`,
      sword:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="12" y1="2" x2="12" y2="18"/><path d="M8 6l4-4 4 4"/><path d="M9 18h6"/><path d="M10 21h4"/></svg>`,
      smp:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`,
      uhc:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
      mace:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="9" y="1" width="6" height="10" rx="2"/><rect x="5" y="3" width="14" height="6" rx="2"/><line x1="12" y1="11" x2="12" y2="23"/></svg>`,
      axe:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 12L5 21"/><path d="M14.5 4.5C12 2 8 2.5 6 5c-1.5 2-1 5 .5 7l8-8c-1-1.5-1.5-3-1-4.5z"/><path d="M14.5 4.5c1.5-1 3.5-.5 4.5 1 1.5 2 1 5-.5 7l-4-4"/></svg>`,
    };
    return m[id] || m.sword;
  }

  window.tryLogin = () => {
    if (document.getElementById("pw-input").value === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById("login-modal").style.display = "none";
      document.getElementById("admin-toolbar").style.display = "flex";
      document.getElementById("admin-badge").style.display = "inline-flex";
      toast("Admin mode enabled ✓");
      render();
    } else {
      document.getElementById("pw-error").style.display = "block";
    }
  };
  window.openLogin  = () => { document.getElementById("login-modal").style.display = "flex"; setTimeout(() => document.getElementById("pw-input").focus(), 50); };
  window.closeLogin = () => document.getElementById("login-modal").style.display = "none";
  window.addPlayer  = () => {
    const inp = document.getElementById("player-input");
    const name = inp.value.trim();
    if (!name) return;
    if ((state.players || []).map(p => p.toLowerCase()).includes(name.toLowerCase())) { toast("Already exists!", true); return; }
    state.players.push(name); inp.value = ""; save();
  };
  window.handleKey = e => { if (e.key === "Enter") window.addPlayer(); };

  function toast(msg, err = false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show" + (err ? " err" : "");
    clearTimeout(t._t);
    t._t = setTimeout(() => t.className = "toast", 2500);
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") window.tryLogin(); });
    document.addEventListener("click", (e) => {
      const menu = document.getElementById("context-menu");
      if (!menu.contains(e.target)) hideContextMenu();
    });
  });
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #13151c;
  --topbar:  #0e1018;
  --surface: #1a1d28;
  --col-bg:  #181b26;
  --row-bg:  #1e2230;
  --row-hover: #252a3a;
  --border:  #252836;
  --text:    #dde0ee;
  --muted:   #556;
  --accent:  #5865f2;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top nav bar ── */
.top-nav {
  background: var(--topbar);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 16px;
  overflow-x: auto;
  flex-shrink: 0;
}

.site-logo {
  font-size: 0.9rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
  padding: 0 16px 0 4px;
  border-right: 1px solid var(--border);
  margin-right: 8px;
  white-space: nowrap;
  flex-shrink: 0;
}

#tab-bar {
  display: flex;
  align-items: stretch;
  gap: 0;
  flex: 1;
}

.tab-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 20px;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: #667;
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: color .12s, border-color .12s, background .12s;
  white-space: nowrap;
  letter-spacing: 0.3px;
}
.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.tab-btn.active { color: #fff; border-bottom-color: #fff; }

.tab-icon { width: 20px; height: 20px; display: flex; align-items: center; }
.tab-icon svg { width: 100%; height: 100%; }
.tab-label { font-size: 0.72rem; }

.nav-right {
  margin-left: auto;
  flex-shrink: 0;
  padding-left: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.admin-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: #556;
  border-radius: 5px;
  padding: 5px 12px;
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: color .1s, border-color .1s;
}
.admin-btn:hover { color: var(--text); border-color: #445; }

#admin-badge {
  display: none;
  align-items: center;
  gap: 4px;
  font-size: 0.68rem;
  font-weight: 600;
  color: #4cde82;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; background: #4cde82; }

/* ── Admin toolbar ── */
#admin-toolbar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  background: rgba(88,101,242,0.06);
  border-bottom: 1px solid rgba(88,101,242,0.15);
  flex-wrap: wrap;
  flex-shrink: 0;
}
#admin-toolbar > .lbl {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--accent);
  text-transform: uppercase;
}
#player-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 6px 10px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.83rem;
  outline: none;
  width: 200px;
}
#player-input:focus { border-color: var(--accent); }
.btn-add {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 5px;
  padding: 6px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .12s;
}
.btn-add:hover { opacity: 0.85; }
.admin-hint { font-size: 0.7rem; color: var(--muted); margin-left: auto; }

/* ── Main content ── */
.main-content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

/* ── Tier grid (columns) ── */
#tier-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  min-width: 700px;
}

.tier-col {
  background: var(--col-bg);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.tier-col-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 10px;
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 0.3px;
}

.trophy-icon { font-size: 1rem; line-height: 1; }
.tier-col-title { font-size: 0.9rem; font-weight: 700; }

/* ── Player rows ── */
.tier-col-list {
  display: flex;
  flex-direction: column;
  min-height: 60px;
}

.tier-col-list.drop-over { outline: 2px dashed var(--accent); outline-offset: -2px; }

.player-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: var(--row-bg);
  border-top: 1px solid var(--border);
  cursor: default;
  transition: background .1s;
  position: relative;
}
.player-row:first-child { border-top: none; }
.tier-col-list.admin-mode .player-row { cursor: grab; }
.player-row:hover { background: var(--row-hover); }
.player-row.dragging { opacity: 0.25; }

.mc-head {
  width: 24px; height: 24px;
  border-radius: 3px;
  image-rendering: pixelated;
  flex-shrink: 0;
}

.player-name {
  flex: 1;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Tier Level Indicators ── */
.tier-indicator {
  font-size: 0.75rem;
  font-weight: 700;
  margin-left: 4px;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}

.tier-indicator.high-tier {
  color: #4ade80;
  text-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
}

.tier-indicator.low-tier {
  color: #f87171;
  text-shadow: 0 0 8px rgba(248, 113, 113, 0.4);
}

.row-arrow {
  font-size: 0.6rem;
  color: #445;
  letter-spacing: -1px;
  flex-shrink: 0;
}

.col-empty {
  padding: 14px 10px;
  font-size: 0.75rem;
  color: var(--muted);
  font-style: italic;
  text-align: center;
}

/* ── Unranked ── */
#unranked-section { margin-top: 14px; }

.unranked-wrap {
  background: var(--col-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.unranked-title {
  padding: 8px 14px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}
.unranked-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 12px;
  min-height: 50px;
}
.unranked-list .player-row {
  border: 1px solid var(--border);
  border-radius: 5px;
  width: auto;
  flex: none;
}
.unranked-list .player-row:first-child { border-top: 1px solid var(--border); }
.unranked-list.drop-over { outline: 2px dashed var(--accent); outline-offset: -2px; border-radius: 6px; }

/* ── Context Menu ── */
#context-menu {
  position: fixed;
  background: #1e2230;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px;
  min-width: 160px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  z-index: 1000;
  display: none;
  flex-direction: column;
  gap: 2px;
}

.context-menu-item {
  padding: 8px 12px;
  cursor: pointer;
  color: var(--text);
  font-size: 0.8rem;
  font-weight: 500;
  border-radius: 4px;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.context-menu-item:hover {
  background: var(--row-hover);
}

.context-menu-item.active {
  background: rgba(88, 101, 242, 0.2);
  color: #fff;
}

.context-menu-item .indicator-icon {
  font-size: 0.7rem;
  width: 16px;
  text-align: center;
}

.context-menu-item.high-option .indicator-icon {
  color: #4ade80;
}

.context-menu-item.low-option .indicator-icon {
  color: #f87171;
}

.context-menu-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}

/* ── Modal ── */
#login-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 300;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(5px);
}
.modal-box {
  background: #12141e;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 26px;
  width: 310px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.7);
}
.modal-box h2 { font-size: 1rem; font-weight: 700; color: #fff; }
.modal-box p  { font-size: 0.78rem; color: #556; line-height: 1.5; }
.modal-box input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 11px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  outline: none;
  width: 100%;
}
.modal-box input:focus { border-color: var(--accent); }
#pw-error { display: none; font-size: 0.75rem; color: #e05050; }
.modal-btns { display: flex; gap: 7px; }
.modal-btns button {
  flex: 1; padding: 8px;
  border-radius: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 0.83rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
}
.btn-confirm { background: var(--accent); color: #fff; }
.btn-confirm:hover { opacity: 0.85; }
.btn-cancel { background: #1e2130; color: #556; border: 1px solid var(--border) !important; }
.btn-cancel:hover { color: var(--text); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 20px; right: 20px;
  background: #22aa55;
  color: #fff;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 9px 16px;
  border-radius: 6px;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .18s, transform .18s;
  z-index: 999;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.err  { background: #c0392b; }

/* ── Responsive ── */
@media (max-width: 800px) {
  #tier-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 540px) {
  #tier-grid { grid-template-columns: repeat(2, 1fr); }
  .tab-btn { padding: 10px 12px; }
}
</style>
</head>
<body>

<!-- Top nav -->
<nav class="top-nav">
  <div class="site-logo">⚔ PVPTIERS</div>
  <div id="tab-bar"></div>
  <div class="nav-right">
    <span id="admin-badge"><span class="badge-dot"></span> ADMIN</span>
    <button class="admin-btn" onclick="openLogin()">⚙ Admin</button>
  </div>
</nav>

<!-- Admin toolbar -->
<div id="admin-toolbar">
  <span class="lbl">● Admin</span>
  <input type="text" id="player-input" placeholder="Minecraft username..." onkeydown="handleKey(event)" maxlength="24">
  <button class="btn-add" onclick="addPlayer()">+ Add Player</button>
  <span class="admin-hint">Drag to rank · Right-click player for HT/LT · Right-click unranked to remove</span>
</div>

<!-- Main -->
<div class="main-content">
  <div id="tier-grid"></div>
  <div id="unranked-section"></div>
</div>

<!-- Context Menu -->
<div id="context-menu">
  <div class="context-menu-item high-option" id="ctx-high-tier" onclick="setTierLevel('high')">
    <span class="indicator-icon">▲</span>
    <span>Make High Tier (HT)</span>
  </div>
  <div class="context-menu-item low-option" id="ctx-low-tier" onclick="setTierLevel('low')">
    <span class="indicator-icon">▼</span>
    <span>Make Low Tier (LT)</span>
  </div>
  <div class="context-menu-divider" id="ctx-clear-tier" style="display: none;"></div>
  <div class="context-menu-item" id="ctx-clear-btn" onclick="setTierLevel(null)" style="display: none; color: #888;">
    <span class="indicator-icon">—</span>
    <span>Clear Designation</span>
  </div>
</div>

<!-- Login modal -->
<div id="login-modal">
  <div class="modal-box">
    <h2>Admin Login</h2>
    <p>Enter your password to manage the tier list.</p>
    <input type="password" id="pw-input" placeholder="Password...">
    <div id="pw-error">Incorrect password. Try again.</div>
    <div class="modal-btns">
      <button class="btn-confirm" onclick="tryLogin()">Login</button>
      <button class="btn-cancel" onclick="closeLogin()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
</body>
</html>
