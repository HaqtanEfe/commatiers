<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVP Tiers</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDdz5u46Q8IIOEmfUOSmCxKBnoE52A7y34",
    authDomain: "friendstierlist-9a5fb.firebaseapp.com",
    projectId: "friendstierlist-9a5fb",
    storageBucket: "friendstierlist-9a5fb.firebasestorage.app",
    messagingSenderId: "774591972842",
    appId: "1:774591972842:web:d414a35464b4742fa21e93"
  };

  const ADMIN_PASSWORD = "HaqtanEfe";

  const GAMEMODES = [
    { id: "crystal", label: "Crystal" },
    { id: "sword",   label: "Sword"   },
    { id: "smp",     label: "SMP"     },
    { id: "uhc",     label: "UHC"     },
    { id: "mace",    label: "Mace"    },
    { id: "axe",     label: "Axe"     },
  ];

  const TIERS = [
    { id: "HT1", label: "High Tier 1", color: "#e63946", points: 60 },
    { id: "LT1", label: "Low Tier 1",  color: "#ff9aa2", points: 45 },
    { id: "HT2", label: "High Tier 2", color: "#f77f00", points: 30 },
    { id: "LT2", label: "Low Tier 2",  color: "#ffbe7a", points: 20 },
    { id: "HT3", label: "High Tier 3", color: "#2a9d8f", points: 10 },
    { id: "LT3", label: "Low Tier 3",  color: "#8fd3c7", points:  6 },
    { id: "HT4", label: "High Tier 4", color: "#457b9d", points:  4 },
    { id: "LT4", label: "Low Tier 4",  color: "#a8cbe0", points:  3 },
    { id: "HT5", label: "High Tier 5", color: "#6a4c93", points:  2 },
    { id: "LT5", label: "Low Tier 5",  color: "#c3aed6", points:  1 },
  ];

  // Points → title mapping (matching mctiers screenshots)
  const TITLES = [
    { min: 400, label: "Combat Grandmaster", color: "#f5c518", icon: "◈" },
    { min: 250, label: "Combat Master",       color: "#c8a84b", icon: "◈" },
    { min: 100, label: "Combat Ace",          color: "#e05555", icon: "◆" },
    { min:  50, label: "Combat Specialist",   color: "#9b8dff", icon: "◇" },
    { min:  20, label: "Combat Cadet",        color: "#5a8fd4", icon: "◉" },
    { min:  10, label: "Combat Novice",       color: "#5a8fd4", icon: "◎" },
    { min:   0, label: "Rookie",              color: "#667",    icon: "◌" },
  ];

  function getTitle(pts) {
    return TITLES.find(t => pts >= t.min) || TITLES[TITLES.length - 1];
  }

  // Tier rank order (lower index = better) for primary gamemode detection
  const TIER_RANK = Object.fromEntries(TIERS.map((t, i) => [t.id, i]));

  function emptyState() {
    const tiers = {};
    GAMEMODES.forEach(gm => {
      tiers[gm.id] = {};
      TIERS.forEach(t => tiers[gm.id][t.id] = []);
    });
    return { players: [], tiers };
  }

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const REF = doc(db, "tierlist", "data");

  let state      = emptyState();
  let isAdmin    = false;
  let activeGM   = "overall"; // default to overall
  let dragPlayer = null;
  let dragSrc    = null;

  async function save() {
    try { await setDoc(REF, state); }
    catch(e) { toast("Save failed: " + e.message, true); }
  }

  onSnapshot(REF, snap => {
    if (snap.exists()) {
      const d = snap.data();
      if (!d.players) d.players = [];
      if (!d.tiers)   d.tiers   = {};
      GAMEMODES.forEach(gm => {
        if (!d.tiers[gm.id]) d.tiers[gm.id] = {};
        TIERS.forEach(t => { if (!d.tiers[gm.id][t.id]) d.tiers[gm.id][t.id] = []; });
      });
      state = d;
    }
    render();
  });

  // ── Point calculation ──────────────────────────────
  function calcPoints(name) {
    let total = 0;
    GAMEMODES.forEach(gm => {
      TIERS.forEach(tier => {
        if ((state.tiers[gm.id]?.[tier.id] || []).includes(name)) total += tier.points;
      });
    });
    return total;
  }

  // Best tier a player has across all gamemodes (lowest index in TIERS)
  function bestTierOf(name, gmId) {
    for (const tier of TIERS) {
      if ((state.tiers[gmId]?.[tier.id] || []).includes(name)) return tier;
    }
    return null;
  }

  // Primary gamemode: the one where they have the best (lowest rank) tier
  function primaryGamemode(name) {
    let best = null;
    let bestRank = Infinity;
    GAMEMODES.forEach(gm => {
      const tier = bestTierOf(name, gm.id);
      if (tier && TIER_RANK[tier.id] < bestRank) {
        bestRank = TIER_RANK[tier.id];
        best = gm;
      }
    });
    return best;
  }

  // ── Render ─────────────────────────────────────────
  function render() {
    renderNav();
    if (activeGM === "overall") renderOverall();
    else renderMain();
  }

  function renderNav() {
    const nav = document.getElementById("gm-nav");
    nav.innerHTML = "";

    // Overall entry
    const overall = document.createElement("a");
    overall.href = "#";
    overall.className = "nav-item" + (activeGM === "overall" ? " active" : "");
    overall.innerHTML = `<span class="nav-icon">${overallIcon()}</span><span>Overall</span>`;
    overall.onclick = e => { e.preventDefault(); activeGM = "overall"; render(); };
    nav.appendChild(overall);

    GAMEMODES.forEach(gm => {
      const a = document.createElement("a");
      a.href = "#";
      a.className = "nav-item" + (gm.id === activeGM ? " active" : "");
      a.innerHTML = `<span class="nav-icon">${gmIcon(gm.id)}</span><span>${gm.label}</span>`;
      a.onclick = e => { e.preventDefault(); activeGM = gm.id; render(); };
      nav.appendChild(a);
    });
  }

  // ── Overall leaderboard ────────────────────────────
  function renderOverall() {
    document.getElementById("gm-title").textContent = "Overall";
    const content = document.getElementById("tier-content");
    content.innerHTML = "";

    const players = state.players || [];
    if (players.length === 0) {
      content.innerHTML = `<div class="empty-hint" style="padding:40px;text-align:center">No players added yet.</div>`;
      return;
    }

    // Build ranked list
    const ranked = players.map(name => ({
      name,
      points: calcPoints(name),
      primaryGM: primaryGamemode(name),
    })).sort((a, b) => b.points - a.points);

    // Header row
    const headerRow = document.createElement("div");
    headerRow.className = "overall-header";
    headerRow.innerHTML = `
      <span class="oh-rank">#</span>
      <span class="oh-player">Player</span>
      <span class="oh-primary">Primary</span>
      <span class="oh-tiers">Tiers</span>
    `;
    content.appendChild(headerRow);

    let rank = 1;
    ranked.forEach((p, i) => {
      // Handle ties
      if (i > 0 && ranked[i].points < ranked[i - 1].points) rank = i + 1;

      const title = getTitle(p.points);
      const row = document.createElement("div");
      row.className = "overall-row";

      // Rank number
      const rankEl = document.createElement("div");
      rankEl.className = "or-rank";
      rankEl.innerHTML = `<span class="rank-num rank-${rank <= 3 ? rank : 'other'}">${rank}.</span>`;

      // Player info (head + name + title + points)
      const playerEl = document.createElement("div");
      playerEl.className = "or-player";
      playerEl.innerHTML = `
        <img class="mc-head-lg" src="https://minotar.net/avatar/${encodeURIComponent(p.name)}/40" onerror="this.src='https://minotar.net/avatar/MHF_Steve/40'">
        <div class="or-info">
          <span class="or-name">${p.name}</span>
          <span class="or-title" style="color:${title.color}">${title.icon} ${title.label} <span class="or-pts">(${p.points} points)</span></span>
        </div>
      `;

      // Primary gamemode badge
      const primaryEl = document.createElement("div");
      primaryEl.className = "or-primary";
      if (p.primaryGM) {
        primaryEl.innerHTML = `<span class="primary-badge">${p.primaryGM.label}</span>`;
      } else {
        primaryEl.innerHTML = `<span class="primary-badge unranked-badge">—</span>`;
      }

      // Tier badges for each gamemode
      const tiersEl = document.createElement("div");
      tiersEl.className = "or-tiers";
      GAMEMODES.forEach(gm => {
        const tier = bestTierOf(p.name, gm.id);
        const badge = document.createElement("span");
        badge.className = "gm-tier-badge";
        if (tier) {
          badge.textContent = tier.id;
          badge.style.background = tier.color + "22";
          badge.style.color = tier.color;
          badge.style.borderColor = tier.color + "66";
          badge.title = `${gm.label}: ${tier.label}`;
        } else {
          badge.textContent = "—";
          badge.style.color = "#445";
          badge.style.borderColor = "#2a2d3a";
          badge.title = `${gm.label}: Unranked`;
        }
        tiersEl.appendChild(badge);
      });

      row.appendChild(rankEl);
      row.appendChild(playerEl);
      row.appendChild(primaryEl);
      row.appendChild(tiersEl);
      content.appendChild(row);
    });
  }

  // ── Per-gamemode view ──────────────────────────────
  function renderMain() {
    const gm = GAMEMODES.find(g => g.id === activeGM);
    document.getElementById("gm-title").textContent = gm.label;
    const content = document.getElementById("tier-content");
    content.innerHTML = "";

    TIERS.forEach(tier => {
      const players = state.tiers[activeGM]?.[tier.id] || [];
      const section = document.createElement("div");
      section.className = "tier-section";

      const header = document.createElement("div");
      header.className = "tier-header";
      header.innerHTML = `
        <span class="tier-badge" style="background:${tier.color}1a;color:${tier.color};border-color:${tier.color}55">${tier.id}</span>
        <span class="tier-name">${tier.label}</span>
        <span class="tier-pts">${tier.points} pts</span>
        <span class="tier-count">${players.length} player${players.length !== 1 ? "s" : ""}</span>
      `;
      section.appendChild(header);

      const grid = document.createElement("div");
      grid.className = "player-grid" + (isAdmin ? " admin-mode" : "");
      grid.dataset.tier = tier.id;

      if (players.length === 0) {
        const e = document.createElement("div");
        e.className = "empty-hint";
        e.textContent = isAdmin ? "Drop players here" : "No players";
        grid.appendChild(e);
      } else {
        players.forEach(name => grid.appendChild(makeCard(name, tier.id)));
      }

      if (isAdmin) setupDrop(grid, tier.id);
      section.appendChild(grid);
      content.appendChild(section);
    });

    // Unranked
    const inTiers = new Set(TIERS.flatMap(t => state.tiers[activeGM]?.[t.id] || []));
    const unranked = (state.players || []).filter(p => !inTiers.has(p));

    const uSec = document.createElement("div");
    uSec.className = "tier-section unranked-section";
    uSec.innerHTML = `<div class="tier-header">
      <span class="tier-badge" style="background:#1e1e2a;color:#555;border-color:#333">—</span>
      <span class="tier-name">Unranked</span>
      <span class="tier-count">${unranked.length} players</span>
    </div>`;

    const uGrid = document.createElement("div");
    uGrid.className = "player-grid" + (isAdmin ? " admin-mode" : "");
    uGrid.dataset.tier = "unranked";

    if (unranked.length === 0) {
      const e = document.createElement("div");
      e.className = "empty-hint";
      e.textContent = isAdmin ? "Add players using the bar above" : "No unranked players";
      uGrid.appendChild(e);
    } else {
      unranked.forEach(p => uGrid.appendChild(makeCard(p, "unranked")));
    }

    if (isAdmin) setupDrop(uGrid, "unranked");
    uSec.appendChild(uGrid);
    content.appendChild(uSec);
  }

  function makeCard(name, srcTier) {
    const div = document.createElement("div");
    div.className = "player-card";

    const head = document.createElement("img");
    head.className = "mc-head";
    head.src = `https://minotar.net/avatar/${encodeURIComponent(name)}/22`;
    head.onerror = () => head.src = "https://minotar.net/avatar/MHF_Steve/22";

    const nm = document.createElement("span");
    nm.textContent = name;

    div.appendChild(head);
    div.appendChild(nm);

    if (isAdmin) {
      div.draggable = true;
      div.addEventListener("dragstart", e => {
        dragPlayer = name; dragSrc = srcTier;
        setTimeout(() => div.classList.add("dragging"), 0);
        e.dataTransfer.effectAllowed = "move";
      });
      div.addEventListener("dragend", () => div.classList.remove("dragging"));
      div.addEventListener("contextmenu", e => {
        e.preventDefault();
        if (confirm(`Remove "${name}" from all tier lists?`)) {
          state.players = state.players.filter(p => p !== name);
          GAMEMODES.forEach(gm => TIERS.forEach(t => {
            state.tiers[gm.id][t.id] = state.tiers[gm.id][t.id].filter(p => p !== name);
          }));
          save();
        }
      });
    }
    return div;
  }

  function setupDrop(el, targetTier) {
    el.addEventListener("dragover",  e => { e.preventDefault(); el.classList.add("drop-over"); });
    el.addEventListener("dragleave", () => el.classList.remove("drop-over"));
    el.addEventListener("drop", e => {
      e.preventDefault(); el.classList.remove("drop-over");
      if (!dragPlayer || !isAdmin) return;
      if (dragSrc !== "unranked")
        state.tiers[activeGM][dragSrc] = state.tiers[activeGM][dragSrc].filter(p => p !== dragPlayer);
      if (targetTier !== "unranked" && !state.tiers[activeGM][targetTier].includes(dragPlayer))
        state.tiers[activeGM][targetTier].push(dragPlayer);
      save(); dragPlayer = null; dragSrc = null;
    });
  }

  // ── Icons ──────────────────────────────────────────
  function overallIcon() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
  }

  function gmIcon(id) {
    const m = {
      crystal:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polygon points="12,2 22,9 18,21 6,21 2,9"/><line x1="12" y1="2" x2="12" y2="21"/><line x1="2" y1="9" x2="22" y2="9"/></svg>`,
      sword:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="12" y1="2" x2="12" y2="18"/><path d="M8 6l4-4 4 4"/><path d="M9 18h6"/><path d="M10 21h4"/></svg>`,
      smp:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`,
      uhc:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
      mace:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="9" y="1" width="6" height="10" rx="2"/><rect x="5" y="3" width="14" height="6" rx="2"/><line x1="12" y1="11" x2="12" y2="23"/></svg>`,
      axe:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 12L5 21"/><path d="M14.5 4.5C12 2 8 2.5 6 5c-1.5 2-1 5 .5 7l8-8c-1-1.5-1.5-3-1-4.5z"/><path d="M14.5 4.5c1.5-1 3.5-.5 4.5 1 1.5 2 1 5-.5 7l-4-4"/></svg>`,
    };
    return m[id] || m.smp;
  }

  // ── Admin ──────────────────────────────────────────
  window.tryLogin = () => {
    if (document.getElementById("pw-input").value === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById("login-modal").style.display = "none";
      document.getElementById("admin-toolbar").style.display = "flex";
      document.getElementById("admin-badge").style.display = "inline-flex";
      toast("Admin mode enabled");
      render();
    } else {
      document.getElementById("pw-error").style.display = "block";
    }
  };
  window.openLogin  = () => { document.getElementById("login-modal").style.display = "flex"; setTimeout(() => document.getElementById("pw-input").focus(), 50); };
  window.closeLogin = () => document.getElementById("login-modal").style.display = "none";
  window.addPlayer  = () => {
    const inp = document.getElementById("player-input");
    const name = inp.value.trim();
    if (!name) return;
    if ((state.players || []).map(p => p.toLowerCase()).includes(name.toLowerCase())) { toast("Player already exists!", true); return; }
    state.players.push(name); inp.value = ""; save();
  };
  window.handleKey = e => { if (e.key === "Enter") window.addPlayer(); };

  function toast(msg, err = false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show" + (err ? " err" : "");
    clearTimeout(t._t);
    t._t = setTimeout(() => t.className = "toast", 2500);
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") window.tryLogin(); });
  });
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d0f13;
  --sidebar:  #10121a;
  --surface:  #14161f;
  --surface2: #181b24;
  --border:   #1e2130;
  --border2:  #262a38;
  --text:     #e0e2ee;
  --muted:    #4e5268;
  --accent:   #5865f2;
  --hover:    #191c28;
  --active:   #1c2040;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.app { display: flex; flex: 1; min-height: 0; }

/* ── Sidebar ── */
.sidebar {
  width: 218px; min-width: 218px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  height: 100vh; position: sticky; top: 0;
  overflow-y: auto;
}
.sidebar-logo {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
}
.logo-text { font-size: 0.95rem; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
.logo-sub  { font-size: 0.65rem; color: var(--muted); margin-top: 1px; }

.nav-label {
  padding: 14px 16px 5px;
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 1.4px; text-transform: uppercase;
  color: var(--muted);
}
#gm-nav { display: flex; flex-direction: column; padding: 0 8px 8px; gap: 1px; }
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 6px;
  color: var(--muted); text-decoration: none;
  font-size: 0.85rem; font-weight: 500;
  transition: background .1s, color .1s;
}
.nav-item:hover { background: var(--hover); color: var(--text); }
.nav-item.active { background: var(--active); color: #fff; }
.nav-item.active .nav-icon { color: var(--accent); }
.nav-icon { width: 17px; height: 17px; display: flex; align-items: center; flex-shrink: 0; }
.nav-icon svg { width: 100%; height: 100%; }

.sidebar-footer {
  margin-top: auto; padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.footer-copy { font-size: 0.65rem; color: var(--muted); }
#admin-badge {
  display: none; align-items: center; gap: 5px;
  font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.5px; color: #4cde82;
}
.badge-dot { width: 5px; height: 5px; border-radius: 50%; background: #4cde82; }

/* ── Main ── */
.main-wrap { flex: 1; display: flex; flex-direction: column; overflow-y: auto; min-width: 0; }

#admin-toolbar {
  display: none; align-items: center; gap: 8px;
  padding: 9px 24px;
  background: rgba(88,101,242,0.06);
  border-bottom: 1px solid rgba(88,101,242,0.18);
  flex-wrap: wrap;
}
#admin-toolbar > span.label {
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 1px; color: var(--accent); text-transform: uppercase;
}
#player-input {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 6px; padding: 6px 11px;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 0.83rem; outline: none; width: 210px;
}
#player-input:focus { border-color: var(--accent); }
.btn-add {
  background: var(--accent); color: #fff; border: none;
  border-radius: 6px; padding: 6px 14px;
  font-family: 'Inter', sans-serif; font-size: 0.82rem;
  font-weight: 600; cursor: pointer; transition: opacity .12s;
}
.btn-add:hover { opacity: 0.85; }
.admin-hint { font-size: 0.7rem; color: var(--muted); margin-left: auto; }

.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px 12px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 10px;
}
#gm-title { font-size: 1.15rem; font-weight: 700; color: #fff; }
.admin-btn {
  background: transparent; border: 1px solid var(--border2);
  color: var(--muted); border-radius: 6px; padding: 6px 13px;
  font-size: 0.78rem; font-weight: 500; cursor: pointer;
  transition: color .1s, border-color .1s;
}
.admin-btn:hover { color: var(--text); border-color: #333; }

#tier-content { padding: 16px 24px 40px; display: flex; flex-direction: column; gap: 3px; }

/* ── Per-gamemode tier view ── */
.tier-section { border-radius: 8px; overflow: hidden; }
.unranked-section { margin-top: 10px; }

.tier-header {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px;
  background: var(--surface);
  border: 1px solid var(--border); border-bottom: none;
  border-radius: 8px 8px 0 0;
}
.tier-badge {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.8px;
  border: 1px solid; border-radius: 4px; padding: 2px 7px; white-space: nowrap;
}
.tier-name  { font-size: 0.83rem; font-weight: 600; }
.tier-pts   { font-size: 0.72rem; color: var(--muted); }
.tier-count { margin-left: auto; font-size: 0.7rem; color: var(--muted); }

.player-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-top: 1px solid var(--border2);
  border-radius: 0 0 8px 8px;
  min-height: 50px; align-content: flex-start;
}
.player-grid.drop-over { background: #14172a; outline: 2px dashed var(--accent); outline-offset: -2px; }

.player-card {
  display: flex; align-items: center; gap: 6px;
  background: var(--hover); border: 1px solid var(--border2);
  border-radius: 5px; padding: 4px 11px 4px 6px;
  font-size: 0.83rem; font-weight: 600; color: var(--text);
  white-space: nowrap; transition: border-color .1s, background .1s; cursor: default;
}
.player-grid.admin-mode .player-card { cursor: grab; }
.player-card:hover { background: #1d2035; border-color: #32374e; }
.player-card.dragging { opacity: 0.25; }

.mc-head { width: 20px; height: 20px; border-radius: 3px; image-rendering: pixelated; flex-shrink: 0; }

.empty-hint { font-size: 0.75rem; color: var(--muted); font-style: italic; padding: 3px 2px; }

/* ── Overall leaderboard ── */
.overall-header {
  display: grid;
  grid-template-columns: 52px 1fr 110px auto;
  gap: 12px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.overall-row {
  display: grid;
  grid-template-columns: 52px 1fr 110px auto;
  gap: 12px;
  align-items: center;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 4px;
  transition: background .1s;
}
.overall-row:hover { background: var(--hover); }

.or-rank { display: flex; align-items: center; }
.rank-num {
  font-size: 1.1rem; font-weight: 700;
}
.rank-1 { color: #f5c518; }
.rank-2 { color: #b0c4de; }
.rank-3 { color: #c8824b; }
.rank-other { color: var(--muted); }

.or-player { display: flex; align-items: center; gap: 12px; min-width: 0; }
.mc-head-lg {
  width: 40px; height: 40px;
  border-radius: 4px; image-rendering: pixelated;
  flex-shrink: 0;
  background: var(--border2);
}
.or-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.or-name {
  font-size: 1rem; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.or-title { font-size: 0.78rem; font-weight: 600; }
.or-pts   { color: var(--muted); font-weight: 400; font-size: 0.75rem; }

.or-primary { display: flex; align-items: center; }
.primary-badge {
  font-size: 0.72rem; font-weight: 700;
  padding: 4px 10px;
  border-radius: 5px;
  background: #1a2a3a;
  color: #5a9fd4;
  border: 1px solid #2a4a6a;
  white-space: nowrap;
}
.unranked-badge { color: var(--muted); background: var(--surface2); border-color: var(--border2); }

.or-tiers {
  display: flex; flex-wrap: wrap; gap: 4px;
  justify-content: flex-end;
}
.gm-tier-badge {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.5px;
  padding: 2px 6px; border-radius: 4px;
  border: 1px solid; white-space: nowrap;
}

/* ── Modal ── */
#login-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.72); z-index: 300;
  align-items: center; justify-content: center;
  backdrop-filter: blur(5px);
}
.modal-box {
  background: var(--sidebar); border: 1px solid var(--border2);
  border-radius: 10px; padding: 26px; width: 310px;
  display: flex; flex-direction: column; gap: 12px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
.modal-box h2 { font-size: 1rem; font-weight: 700; color: #fff; }
.modal-box p  { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
.modal-box input {
  background: var(--bg); border: 1px solid var(--border2);
  border-radius: 6px; padding: 8px 11px;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 0.88rem; outline: none; width: 100%;
}
.modal-box input:focus { border-color: var(--accent); }
#pw-error { display: none; font-size: 0.75rem; color: #e05050; }
.modal-btns { display: flex; gap: 7px; }
.modal-btns button {
  flex: 1; padding: 8px; border-radius: 6px;
  font-family: 'Inter', sans-serif; font-size: 0.83rem;
  font-weight: 600; cursor: pointer; border: none; transition: opacity .1s;
}
.btn-confirm { background: var(--accent); color: #fff; }
.btn-confirm:hover { opacity: 0.85; }
.btn-cancel { background: var(--hover); color: var(--muted); border: 1px solid var(--border2) !important; }
.btn-cancel:hover { color: var(--text); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: #22aa55; color: #fff;
  font-size: 0.8rem; font-weight: 600;
  padding: 9px 16px; border-radius: 6px;
  opacity: 0; transform: translateY(6px);
  transition: opacity .18s, transform .18s;
  z-index: 999; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.err  { background: #c0392b; }

/* ── Responsive ── */
@media (max-width: 900px) {
  .overall-header,
  .overall-row { grid-template-columns: 44px 1fr 80px auto; gap: 8px; padding: 10px 12px; }
}
@media (max-width: 600px) {
  .sidebar { display: none; }
  #tier-content, .top-bar, #admin-toolbar { padding-left: 14px; padding-right: 14px; }
  .overall-header,
  .overall-row { grid-template-columns: 36px 1fr auto; }
  .oh-primary, .or-primary { display: none; }
}
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">⚔</div>
      <div>
        <div class="logo-text">PVPTIERS</div>
        <div class="logo-sub">Friend Rankings</div>
      </div>
    </div>
    <div class="nav-label">Rankings</div>
    <nav id="gm-nav"></nav>
    <div class="sidebar-footer">
      <span class="footer-copy">pvptiers 2025</span>
      <span id="admin-badge"><span class="badge-dot"></span> ADMIN</span>
    </div>
  </aside>

  <div class="main-wrap">
    <div id="admin-toolbar">
      <span class="label">● Admin</span>
      <input type="text" id="player-input" placeholder="Minecraft username..." onkeydown="handleKey(event)" maxlength="24">
      <button class="btn-add" onclick="addPlayer()">+ Add Player</button>
      <span class="admin-hint">Drag to rank · Right-click card to remove</span>
    </div>

    <div class="top-bar">
      <span id="gm-title"></span>
      <button class="admin-btn" onclick="openLogin()">⚙ Admin Login</button>
    </div>

    <div id="tier-content"></div>
  </div>
</div>

<div id="login-modal">
  <div class="modal-box">
    <h2>Admin Login</h2>
    <p>Enter your password to manage the tier list.</p>
    <input type="password" id="pw-input" placeholder="Password...">
    <div id="pw-error">Incorrect password. Try again.</div>
    <div class="modal-btns">
      <button class="btn-confirm" onclick="tryLogin()">Login</button>
      <button class="btn-cancel" onclick="closeLogin()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
</body>
</html>
